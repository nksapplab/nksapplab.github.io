<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f14;--surface:#1a1a24;--surface2:#24243a;--border:#2e2e4a;--text:#e4e4ef;--text-muted:#8888a4;--accent:#a78bfa;--accent-dim:#7c5cbf;--green:#4ade80;--yellow:#facc15;--red:#f87171;--orange:#fb923c}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.container{max-width:640px;margin:0 auto;padding:24px 16px 48px}
header{text-align:center;padding:32px 0 24px}
header h1{font-size:1.6rem;font-weight:700;margin-bottom:4px}
header h1 span{color:var(--accent)}
header p{color:var(--text-muted);font-size:.9rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px}
.card-title{font-size:.85rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}

/* Password display */
.pw-display{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 52px 16px 16px;margin-bottom:16px;min-height:56px;display:flex;align-items:center;word-break:break-all;font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-size:1.05rem;letter-spacing:.03em;cursor:pointer;transition:border-color .2s}
.pw-display:hover{border-color:var(--accent)}
.pw-display .copy-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:var(--text-muted)}
.pw-display .copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pw-display .copy-btn.copied{background:var(--green);border-color:var(--green);color:#fff}

/* Strength meter */
.strength-bar{height:4px;border-radius:2px;background:var(--surface2);margin-bottom:6px;overflow:hidden}
.strength-bar-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
.strength-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.strength-label{font-size:.8rem;font-weight:600}

/* Controls */
.control-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.control-row:last-child{border-bottom:none}
.control-row label{font-size:.95rem;user-select:none}
.slider-row{padding:14px 0}
.slider-row .label-row{display:flex;justify-content:space-between;margin-bottom:8px}
.slider-row .label-row span{font-size:.95rem}
.slider-row .label-row strong{color:var(--accent);font-size:1.1rem}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--surface2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--accent)}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:3px solid var(--bg)}

/* Toggle switch */
.toggle{position:relative;width:48px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:var(--surface2);border-radius:13px;cursor:pointer;transition:.2s}
.toggle .slider::before{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;background:var(--text-muted);border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--accent)}
.toggle input:checked+.slider::before{transform:translateX(22px);background:#fff}

/* Count selector */
.count-selector{display:flex;align-items:center;gap:12px}
.count-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.count-btn:hover{border-color:var(--accent);color:var(--accent)}
.count-val{font-size:1.1rem;font-weight:600;min-width:20px;text-align:center}

/* Generate button */
.gen-btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(167,139,250,.3)}
.gen-btn:active{transform:translateY(0)}

/* Multi-password list */
.pw-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.pw-item{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:.9rem;word-break:break-all;cursor:pointer;transition:border-color .2s}
.pw-item:hover{border-color:var(--accent)}
.pw-item .pw-text{flex:1}
.pw-item .mini-copy{flex-shrink:0;width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.pw-item .mini-copy:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pw-item .mini-copy.copied{background:var(--green);border-color:var(--green);color:#fff}

/* Promo section */
.promo{margin-top:32px;text-align:center}
.promo h2{font-size:1rem;color:var(--text-muted);margin-bottom:16px;font-weight:500}
.promo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.promo-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 16px;text-decoration:none;color:var(--text);transition:all .2s;display:block}
.promo-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.promo-card .emoji{font-size:1.8rem;margin-bottom:8px;display:block}
.promo-card .name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.promo-card .price{color:var(--accent);font-size:.85rem;font-weight:600}

/* Footer */
footer{text-align:center;padding:32px 0 16px;color:var(--text-muted);font-size:.8rem}
footer a{color:var(--accent);text-decoration:none}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#000;padding:10px 20px;border-radius:10px;font-size:.9rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1><span>&#128274;</span> パスワード<span>生成</span>ツール</h1>
    <p>安全なパスワードを瞬時に作成 &#8212; 完全無料</p>
  </header>

  <!-- Main password display -->
  <div class="card">
    <div class="pw-display" id="mainPw" onclick="copyMain()" title="クリックでコピー">
      <span id="mainPwText">&#8203;</span>
      <button class="copy-btn" id="mainCopyBtn" aria-label="コピー">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </button>
    </div>
    <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>
    <div class="strength-row">
      <span class="strength-label" id="strengthLabel" style="color:var(--text-muted)">-</span>
      <span style="font-size:.8rem;color:var(--text-muted)" id="entropyText"></span>
    </div>
    <button class="gen-btn" onclick="generate()">パスワードを生成</button>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="card-title">設定</div>

    <div class="slider-row">
      <div class="label-row">
        <span>文字数</span>
        <strong id="lenVal">16</strong>
      </div>
      <input type="range" id="lenSlider" min="8" max="64" value="16" oninput="updateLen()">
    </div>

    <div class="control-row">
      <label for="optUpper">大文字 (A-Z)</label>
      <label class="toggle"><input type="checkbox" id="optUpper" checked><span class="slider"></span></label>
    </div>
    <div class="control-row">
      <label for="optLower">小文字 (a-z)</label>
      <label class="toggle"><input type="checkbox" id="optLower" checked><span class="slider"></span></label>
    </div>
    <div class="control-row">
      <label for="optNum">数字 (0-9)</label>
      <label class="toggle"><input type="checkbox" id="optNum" checked><span class="slider"></span></label>
    </div>
    <div class="control-row">
      <label for="optSym">記号 (!@#$%...)</label>
      <label class="toggle"><input type="checkbox" id="optSym" checked><span class="slider"></span></label>
    </div>

    <div class="control-row">
      <label>一括生成数</label>
      <div class="count-selector">
        <button class="count-btn" onclick="changeCount(-1)">&#8722;</button>
        <span class="count-val" id="countVal">1</span>
        <button class="count-btn" onclick="changeCount(1)">&#43;</button>
      </div>
    </div>
  </div>

  <!-- Multi-password list (hidden when count=1) -->
  <div id="pwListCard" class="card" style="display:none">
    <div class="card-title">生成結果</div>
    <div class="pw-list" id="pwList"></div>
  </div>

  <!-- Cross-promotion -->
  <div class="promo">
    <h2>&#9889; 他のAIツールもチェック</h2>
    <div class="promo-grid">
      <a class="promo-card" href="https://ai-dream-analysis.nksapplab2025.workers.dev/" target="_blank" rel="noopener">
        <span class="emoji">&#127769;</span>
        <div class="name">AI夢診断</div>
        <div class="price">&#165;300</div>
      </a>
      <a class="promo-card" href="https://ai-name-analysis.nksapplab2025.workers.dev/" target="_blank" rel="noopener">
        <span class="emoji">&#128209;</span>
        <div class="name">AI名前診断</div>
        <div class="price">&#165;200</div>
      </a>
      <a class="promo-card" href="https://ai-compatibility-check.nksapplab2025.workers.dev/" target="_blank" rel="noopener">
        <span class="emoji">&#128149;</span>
        <div class="name">AI相性診断</div>

      </a>

<div class="toast" id="toast">コピーしました</div>

<script>
(function(){
  'use strict';

  const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const LOWER = 'abcdefghijklmnopqrstuvwxyz';
  const NUMS  = '0123456789';
  const SYMS  = '!@#$%^&*()_+-=[]{}|;:,.<>?';

  let count = 1;
  let passwords = [];

  const $ = id => document.getElementById(id);

  function getCharset() {
    let cs = '';
    if ($('optUpper').checked) cs += UPPER;
    if ($('optLower').checked) cs += LOWER;
    if ($('optNum').checked)   cs += NUMS;
    if ($('optSym').checked)   cs += SYMS;
    return cs;
  }

  function secureRandom(max) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function genPassword(len, charset) {
    if (!charset) return '';
    const arr = new Uint8Array(len);
    crypto.getRandomValues(arr);
    let pw = '';
    for (let i = 0; i < len; i++) {
      pw += charset[arr[i] % charset.length];
    }
    // Ensure at least one char from each selected category
    const cats = [];
    if ($('optUpper').checked) cats.push(UPPER);
    if ($('optLower').checked) cats.push(LOWER);
    if ($('optNum').checked)   cats.push(NUMS);
    if ($('optSym').checked)   cats.push(SYMS);
    if (cats.length > 1 && len >= cats.length) {
      const pwArr = pw.split('');
      const positions = [];
      while (positions.length < cats.length) {
        const p = secureRandom(len);
        if (!positions.includes(p)) positions.push(p);
      }
      cats.forEach((cat, i) => {
        pwArr[positions[i]] = cat[secureRandom(cat.length)];
      });
      pw = pwArr.join('');
    }
    return pw;
  }

  function calcStrength(pw) {
    if (!pw) return { score: 0, label: '-', color: 'var(--text-muted)', entropy: 0 };
    const charset = getCharset();
    const poolSize = charset.length;
    const entropy = pw.length * Math.log2(poolSize || 1);
    if (entropy < 40)       return { score: 20,  label: '非常に弱い', color: 'var(--red)',    entropy };
    if (entropy < 60)       return { score: 40,  label: '弱い',       color: 'var(--orange)', entropy };
    if (entropy < 80)       return { score: 60,  label: '普通',       color: 'var(--yellow)', entropy };
    if (entropy < 100)      return { score: 80,  label: '強い',       color: 'var(--green)',  entropy };
    return                          { score: 100, label: '非常に強い', color: 'var(--green)',  entropy };
  }

  function updateStrength(pw) {
    const s = calcStrength(pw);
    $('strengthFill').style.width = s.score + '%';
    $('strengthFill').style.background = s.color;
    $('strengthLabel').textContent = s.label;
    $('strengthLabel').style.color = s.color;
    $('entropyText').textContent = s.entropy > 0 ? Math.round(s.entropy) + ' bits' : '';
  }

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg || 'コピーしました';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  }

  function copyToClipboard(text, btnEl) {
    navigator.clipboard.writeText(text).then(() => {
      if (btnEl) {
        btnEl.classList.add('copied');
        setTimeout(() => btnEl.classList.remove('copied'), 1200);
      }
      showToast();
    });
  }

  window.updateLen = function() {
    $('lenVal').textContent = $('lenSlider').value;
  };

  window.changeCount = function(delta) {
    count = Math.max(1, Math.min(10, count + delta));
    $('countVal').textContent = count;
  };

  window.copyMain = function() {
    if (passwords.length > 0) {
      copyToClipboard(passwords[0], $('mainCopyBtn'));
    }
  };

  window.generate = function() {
    const charset = getCharset();
    if (!charset) {
      $('mainPwText').textContent = '文字種を1つ以上選択してください';
      $('mainPwText').style.color = 'var(--red)';
      updateStrength('');
      $('pwListCard').style.display = 'none';
      return;
    }
    $('mainPwText').style.color = '';

    const len = parseInt($('lenSlider').value);
    passwords = [];
    for (let i = 0; i < count; i++) {
      passwords.push(genPassword(len, charset));
    }

    $('mainPwText').textContent = passwords[0];
    updateStrength(passwords[0]);

    if (count > 1) {
      $('pwListCard').style.display = '';
      const list = $('pwList');
      list.innerHTML = '';
      passwords.forEach((pw, i) => {
        const item = document.createElement('div');
        item.className = 'pw-item';
        item.innerHTML = '<span class="pw-text"></span><button class="mini-copy" aria-label="コピー"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>';
        item.querySelector('.pw-text').textContent = pw;
        const btn = item.querySelector('.mini-copy');
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          copyToClipboard(pw, btn);
        });
        item.addEventListener('click', function() {
          copyToClipboard(pw, btn);
        });
        list.appendChild(item);
      });
    } else {
      $('pwListCard').style.display = 'none';
    }
  };

  // Prevent all toggles off
  ['optUpper','optLower','optNum','optSym'].forEach(id => {
    $(id).addEventListener('change', function() {
      const any = $('optUpper').checked || $('optLower').checked || $('optNum').checked || $('optSym').checked;
      if (!any) {
        this.checked = true;
        showToast('最低1つの文字種が必要です');
      }
    });
  });

  // Generate on load
  generate();
})();
</script>
